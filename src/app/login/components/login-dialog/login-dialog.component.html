<div class="login-dialog-container">
  <div class="login-dialog-header">
    <h1 class="tienda-title">{{ 'layout.login' | translate }}</h1>
    <div class="login-dialog-header-logo">
      <img src="/assets/logo/logo.png" alt="Logo Tienda" />
    </div>
  </div>
  <div class="login-dialog-body">
    <mat-form-field class="tienda-f-width">
      <mat-label>{{ 'profile.user-data.email' | translate }}</mat-label>
      <input matInput [placeholder]=" 'profile.user-data.email' | translate " type="email"
        [formControl]="form.controls.email" />
    </mat-form-field>
    <mat-form-field class="tienda-f-width">
      <mat-label>{{ 'profile.user-data.password' | translate }}</mat-label>
      <input matInput [placeholder]=" 'profile.user-data.password' | translate " type="password"
        [formControl]="form.controls.password" />
    </mat-form-field>
  </div>
  <div class="login-dialog-footer">
    <button class="tienda-primary-button" (click)="login()">{{ 'layout.login' | translate }}</button>
  </div>
</div>
