@let sectionTemplate = section();
<div class="section-button" [routerLink]="sectionTemplate.route"  [matMenuTriggerFor]="displayMenu() ? menu : null" [class.disabled]="sectionTemplate.disabled">
    <div class="icon" [routerLinkActive]="'active-icon'" [matBadge]="displayBadge() ? productsSelected() : sectionTemplate.badge" matBadgePosition="above after">
      <mat-icon>{{sectionTemplate.icon}}</mat-icon>
    </div>
    <span class="text" [routerLinkActive]="'active-text'">
      {{sectionTemplate.title | translate}}
    </span>
  </div>

  <mat-menu #menu="matMenu">
    <div class="header-buttons-menu">
      @if (!currentUser()) {
        <button class="tienda-primary-button" (click)="openMenu()">{{ 'layout.login' | translate }}</button>
        <button class="tienda-primary-button" (click)="navigateToRegister()">{{ 'layout.register' | translate }}</button>
      }@else if (currentUser()) {
        <button class="tienda-primary-button" (click)="navigateToOrders()">{{ 'layout.my-orders' | translate }}</button>
        <button class="tienda-primary-button" (click)="navigateToRegister()">{{ 'layout.profile' | translate }}</button>
        <button class="tienda-primary-button" (click)="logout()">{{ 'layout.logout' | translate }}</button>
      }
    </div>
  </mat-menu>
